id: psi_sales_by_period
description: "기간/버전 판매량 합계"
sql: |
  SELECT SUM(SALES_MEQ) AS sales
  FROM mst_psi_simul_report
  WHERE VERSION LIKE :version
    AND YEARMONTH BETWEEN :from_yyyymm AND :to_yyyymm
params:
  version:
    type: string
    required: false
    default: "%"
    aliases: ["버전", "VERSION"]
  from_yyyymm:
    type: yyyymm
    required: true
    aliases: ["시작월", "FROM", "시작"]
  to_yyyymm:
    type: yyyymm
    required: true
    aliases: ["종료월", "TO", "끝"]
result:
  mode: scalar
  field: sales
  empty_message: "해당 조건의 판매 데이터가 없습니다."
